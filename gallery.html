<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gallery • SSF Elettil</title>
<link rel="stylesheet" href="styles.css" />
<style>
/* gallery local styles */
.gallery-wrap { max-width:1150px; margin:2.2rem auto; padding:0 16px; }
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
.gallery-item { border-radius:10px; overflow:hidden; background:#f3f4f6; border:1px solid #e6e9ef; cursor:pointer; min-height:140px; display:flex; align-items:center; justify-content:center; position:relative; }
.gallery-item img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s ease; }
.gallery-item:hover img { transform: scale(1.03); }

/* lightbox */
.lightbox { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.88); z-index:1200; padding:18px; }
.lightbox.show { display:flex; }
.lb-inner { max-width:1200px; width:100%; display:block; position:relative; }
.lb-image { display:block; max-width:100%; max-height:80vh; margin:0 auto; border-radius:6px; object-fit:contain; }
.lb-topbar { display:flex; gap:10px; justify-content:space-between; align-items:center; margin-bottom:10px; color:#fff; }
.lb-actions { display:flex; gap:8px; align-items:center; }
.lb-btn { padding:8px 12px; border-radius:6px; text-decoration:none; color:#fff; background:#1d4ed8; border: none; cursor:pointer; }
.lb-close { background:#fff; color:#111; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
.lb-nav { position:absolute; top:50%; transform:translateY(-50%); width:100%; display:flex; justify-content:space-between; pointer-events:none; }
.lb-nav button{ pointer-events:auto; background:rgba(255,255,255,0.85); border:none; padding:10px 12px; border-radius:8px; cursor:pointer; font-weight:700; }
.lb-index { color:#fff; font-weight:600; }

/* responsive */
@media (max-width:600px){
  .gallery-item { min-height:110px }
  .lb-image { max-height:78vh }
  .lb-nav button{ padding:8px 10px; }
}
</style>
</head>
<body>

<header class="navbar">
  <div class="container nav-content">
    <div class="logo">
      <img src="assets/ssf-logo.png" alt="SSF Logo" style="width:32px;height:32px;">
      <span class="ssf-text">SSF</span>
      <span class="unit-text">Elettil Town Unit</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="gallery-wrap">
  <h1 style="text-align:center;margin-bottom:1rem;">Gallery</h1>
  <div id="galleryGrid" class="gallery-grid" aria-live="polite"></div>
</main>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
  <div class="lb-inner" role="document">
    <div class="lb-topbar">
      <div class="lb-index" id="lbIndex">1 / 10</div>
      <div class="lb-actions">
        <a id="lbDownload" class="lb-btn" href="#" download>Download</a>
        <button id="lbClose" class="lb-close">Close</button>
      </div>
    </div>

    <img id="lbImage" class="lb-image" src="" alt="Large photo">

    <!-- Prev / Next (overlay) -->
    <div class="lb-nav" aria-hidden="true">
      <button id="lbPrev" aria-label="Previous image">‹</button>
      <button id="lbNext" aria-label="Next image">›</button>
    </div>
  </div>
</div>

<footer class="site-footer" role="contentinfo" aria-label="Footer">
  <div class="footer-inner container">
    <div class="footer-brand">
      <img src="assets/ssf-logo.png" alt="SSF Elettil logo" class="footer-logo">
      <div>
        <strong class="footer-org">SSF Elettil Town Unit</strong>
        <div class="footer-tag">Student's Centre , Markaz valley - Elettil</div>
      </div>
    </div>

    <nav class="footer-nav" aria-label="Footer navigation">
      <ul>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#programs">Programs</a></li>
        <li><a href="index.html#leaders">Leaders</a></li>
        <li><a href="index.html#gallery">Gallery</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>


   
<div class="footer-partners">
  
    <div class="footer-logo-row">
        <div class="footer-logo-card"><img src="assets/footer-logos/logo1.png" alt="Partner 1"></div>
        <div class="footer-logo-card"><img src="assets/footer-logos/logo2.png" alt="Partner 2"></div>
        <div class="footer-logo-card"><img src="assets/footer-logos/logo3.png" alt="Partner 3"></div>
        <div class="footer-logo-card"><img src="assets/footer-logos/logo4.png" alt="Partner 4"></div>
        <div class="footer-logo-card"><img src="assets/footer-logos/logo5.png" alt="Partner 4"></div>
    </div>
</div>

    <div class="footer-contact" aria-label="Contact info">
      
      <div class="contact-row">✉️ <a href="mailto:ssfelettiltown@gmail.com">ssfelettiltown@gmail.com</a></div>

      
    </div>
  </div>




  <div class="footer-bottom">
    <div class="container footer-bottom-inner">
      <small>© <span id="year"></span> SSF Elettil Town Unit. All rights reserved.</small>
      <a href="privacy.html" class="footer-legal">Privacy &amp; Terms</a>
    </div>
  </div>
</footer>
<!-- end footer -->


<script src="gallery.js"></script>
</body>
</html>
